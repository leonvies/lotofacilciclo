<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ciclos por Coluna - Mobile</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #020617;
            --accent: #6366f1;
            --success: #10b981;
        }
        body {
            background-color: var(--bg-deep);
            color: #f1f5f9;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: contain;
        }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        
        .glass {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        @keyframes pulse-ring {
            0% { transform: scale(0.95); opacity: 0.5; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.5; }
        }
        .animate-target { animation: pulse-ring 2s infinite ease-in-out; }

        /* Estilização da Barra de Ajuste (Slider) com mais corpo */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 12px; /* Aumentado para dar mais corpo */
            cursor: pointer;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 28px; /* Aumentado para facilitar o toque */
            width: 28px; /* Aumentado para facilitar o toque */
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            margin-top: -9px; /* Centraliza o thumb no track de 12px */
            border: 4px solid #000;
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.5);
        }

        input[type=range]:active::-webkit-slider-thumb {
            transform: scale(1.1);
            background: #818cf8;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const Icons = {
            Target: () => <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" strokeWidth="2" fill="none"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>,
            Check: () => <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" strokeWidth="3" fill="none"><polyline points="20 6 9 17 4 12"/></svg>
        };

        const App = () => {
            const [results, setResults] = useState([]);
            const [loading, setLoading] = useState(true);
            const [minFreq, setMinFreq] = useState(150);

            useEffect(() => {
                fetch('https://loteriascaixa-api.herokuapp.com/api/lotofacil')
                    .then(res => res.json())
                    .then(data => {
                        setResults(Array.isArray(data) ? data : [data]);
                        setLoading(false);
                    })
                    .catch(() => setLoading(false));
            }, []);

            const analysis = useMemo(() => {
                if (results.length === 0) return null;
                const timeline = [...results].sort((a, b) => parseInt(a.concurso) - parseInt(b.concurso));
                
                return Array.from({ length: 15 }).map((_, colIdx) => {
                    const freqMap = {};
                    timeline.forEach(draw => {
                        const num = Number(draw.dezenas.sort((a,b) => a-b)[colIdx]);
                        freqMap[num] = (freqMap[num] || 0) + 1;
                    });

                    const pool = Object.keys(freqMap).map(Number).filter(n => freqMap[n] >= minFreq);
                    let currentSet = new Set();
                    let cycleCount = 0;

                    timeline.forEach(draw => {
                        const num = Number(draw.dezenas.sort((a,b) => a-b)[colIdx]);
                        if (pool.includes(num)) {
                            currentSet.add(num);
                            if (currentSet.size === pool.length) {
                                cycleCount++;
                                currentSet = new Set();
                            }
                        }
                    });

                    const missing = pool.filter(n => !currentSet.has(n));
                    const present = Array.from(currentSet);
                    
                    return {
                        col: colIdx + 1,
                        missing: missing.sort((a,b) => a - b),
                        present: present.sort((a,b) => a - b),
                        poolSize: pool.length,
                        cycleCount,
                        progress: (((pool.length - missing.length) / pool.length) * 100).toFixed(0),
                        freqMap
                    };
                });
            }, [results, minFreq]);

            if (loading) return (
                <div className="h-screen flex flex-col items-center justify-center bg-[#020617]">
                    <div className="w-12 h-12 border-4 border-indigo-500/20 border-t-indigo-500 rounded-full animate-spin mb-4"></div>
                    <span className="text-[10px] font-black uppercase tracking-[0.3em] text-slate-500">Analizando Dados...</span>
                </div>
            );

            return (
                <div className="max-w-md mx-auto pb-12">
                    <header className="p-6 pb-2">
                        <div className="flex items-center gap-3">
                            <div className="text-indigo-500"><Icons.Target /></div>
                            <h1 className="text-xl font-black tracking-tighter italic uppercase">CICLOS POR <span className="text-indigo-400">COLUNA</span></h1>
                        </div>
                    </header>

                    {/* Configurações Expostas e Ajustadas */}
                    <div className="mx-4 mb-4 p-5 bg-slate-900/50 border border-white/5 rounded-3xl shadow-lg">
                        <div className="flex justify-between items-center mb-4">
                            <label className="text-[10px] font-black text-indigo-400 uppercase tracking-widest block italic">Filtro de Números (Frequência)</label>
                            <span className="bg-indigo-500/20 text-indigo-400 px-2 py-0.5 rounded-lg font-mono text-xs font-bold">{minFreq}x</span>
                        </div>
                        
                        <div className="relative flex items-center mb-3">
                            <input 
                                type="range" min="50" max="300" value={minFreq} 
                                onChange={(e) => setMinFreq(e.target.value)}
                                className="w-full h-3 accent-indigo-500"
                            />
                        </div>
                        
                        <div className="flex justify-between font-mono text-[9px] text-slate-500 font-bold uppercase tracking-tighter">
                            <div className="flex flex-col items-start">
                                <span>+ Números</span>
                                <span className="opacity-50">Menos Rígido</span>
                            </div>
                            <div className="flex flex-col items-end">
                                <span>- Números</span>
                                <span className="opacity-50">Mais Rígido</span>
                            </div>
                        </div>
                    </div>

                    <div className="px-4 mb-6">
                        <div className="bg-slate-900/50 border border-white/5 p-4 rounded-3xl flex justify-between items-center">
                            <div>
                                <p className="text-[9px] font-black text-slate-500 uppercase">Último Concurso</p>
                                <p className="text-lg font-mono font-black text-white">#{results[0]?.concurso}</p>
                            </div>
                            <div className="text-right">
                                <p className="text-[9px] font-black text-slate-500 uppercase">Base de Dados</p>
                                <p className="text-sm font-mono font-bold text-slate-300">{results.length} JOGOS</p>
                            </div>
                        </div>
                    </div>

                    <div className="px-4 space-y-6">
                        {analysis?.map((item) => (
                            <div key={item.col} className="bg-white/[0.02] border border-white/5 rounded-[2.5rem] p-6 shadow-xl">
                                <div className="flex justify-between items-start mb-6">
                                    <div>
                                        <div className="flex items-center gap-2 mb-1">
                                            <span className="px-2 py-0.5 bg-indigo-500 text-white text-[9px] font-black rounded uppercase">COLUNA {item.col}</span>
                                            <span className="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Ciclo {item.cycleCount}</span>
                                        </div>
                                        <h3 className="text-xl font-black text-white tracking-tight">Faltam {item.missing.length} dezenas</h3>
                                    </div>
                                    <div className="text-right">
                                        <span className={`text-2xl font-black ${parseInt(item.progress) > 80 ? 'text-emerald-500' : 'text-slate-300'}`}>
                                            {item.progress}%
                                        </span>
                                    </div>
                                </div>

                                <div className="w-full bg-black/40 h-2 rounded-full mb-8 overflow-hidden">
                                    <div 
                                        className="h-full bg-indigo-500 transition-all duration-700 ease-out"
                                        style={{ width: `${item.progress}%` }}
                                    ></div>
                                </div>

                                {/* SEÇÃO: AGUARDANDO (O que ainda não veio) */}
                                <div className="mb-6">
                                    <div className="flex items-center gap-2 mb-3">
                                        <div className="w-1.5 h-1.5 rounded-full bg-indigo-500 animate-pulse"></div>
                                        <span className="text-[10px] font-black text-indigo-400 uppercase tracking-widest italic">Aguardando sorteio</span>
                                    </div>
                                    <div className="flex flex-wrap gap-2.5">
                                        {item.missing.map(num => (
                                            <div key={num} className="flex flex-col items-center">
                                                <div className="w-12 h-12 rounded-2xl bg-indigo-500 border-2 border-indigo-400 shadow-[0_0_15px_rgba(99,102,241,0.4)] flex items-center justify-center animate-target">
                                                    <span className="text-lg font-mono font-black text-white">{String(num).padStart(2, '0')}</span>
                                                </div>
                                                <span className="text-[8px] font-bold text-indigo-400/60 mt-1 uppercase">{item.freqMap[num]}x</span>
                                            </div>
                                        ))}
                                        {item.missing.length === 0 && (
                                            <div className="w-full py-4 text-center border-2 border-dashed border-emerald-500/20 rounded-2xl">
                                                <span className="text-xs font-black text-emerald-500 uppercase tracking-widest">Ciclo Concluído!</span>
                                            </div>
                                        )}
                                    </div>
                                </div>

                                {/* SEÇÃO: JÁ SORTEADOS (O que já veio no ciclo) */}
                                {item.present.length > 0 && (
                                    <div className="pt-4 border-t border-white/5">
                                        <span className="text-[9px] font-black text-slate-600 uppercase tracking-widest block mb-3 italic">Já sorteados no ciclo atual</span>
                                        <div className="flex flex-wrap gap-2 opacity-30">
                                            {item.present.map(num => (
                                                <div key={num} className="relative w-9 h-9 rounded-xl bg-white/5 border border-white/5 flex items-center justify-center">
                                                    <span className="text-xs font-mono font-bold text-slate-500">{String(num).padStart(2, '0')}</span>
                                                    <div className="absolute -top-1 -right-1 bg-emerald-500 rounded-full p-0.5">
                                                        <Icons.Check />
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        ))}
                    </div>

                    <footer className="mt-12 mb-12 px-8 text-center">
                        <p className="text-[9px] font-bold text-slate-700 uppercase tracking-[0.4em]">Análise de Probabilidade Posicional</p>
                        <p className="text-[8px] text-slate-800 mt-2 italic">As dezenas em azul são as que ainda não apareceram nesta coluna desde o início do ciclo real configurado.</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
