<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ciclos por Coluna - Mobile</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #020617;
            --accent: #6366f1;
        }
        body {
            background-color: var(--bg-deep);
            color: #f1f5f9;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: contain;
        }
        
        /* Fonte limpa para os números sem o zero cortado */
        .font-num { 
            font-family: 'Inter', sans-serif; 
            font-variant-numeric: tabular-nums;
            letter-spacing: -0.05em;
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }

        .btn-select {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-select:active {
            transform: scale(0.95);
        }

        /* Estilo das bolas de sorteio */
        .lotto-ball {
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 9999px;
            position: relative;
            box-shadow: inset -4px -4px 8px rgba(0,0,0,0.3), 0 4px 10px rgba(0,0,0,0.4);
        }

        /* Brilho superior para efeito 3D de bola */
        .lotto-ball::after {
            content: '';
            position: absolute;
            top: 15%;
            left: 15%;
            width: 30%;
            height: 30%;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 50%;
            filter: blur(2px);
        }

        /* Efeito de Relevo nos Cards */
        .card-relief {
            background: linear-gradient(145deg, rgba(30, 41, 59, 0.4), rgba(15, 23, 42, 0.6));
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 
                        0 10px 10px -5px rgba(0, 0, 0, 0.4),
                        inset 0 1px 1px rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const Icons = {
            Target: () => <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" strokeWidth="2" fill="none"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>,
            Check: () => <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" strokeWidth="3" fill="none"><polyline points="20 6 9 17 4 12"/></svg>
        };

        const getBallStyle = (number) => {
            const lastDigit = number % 10;
            const config = {
                1: { bg: '#e11d48', text: '#fff' },
                2: { bg: '#fbbf24', text: '#000' },
                3: { bg: '#16a34a', text: '#fff' },
                4: { bg: '#92400e', text: '#fff' },
                5: { bg: '#2563eb', text: '#fff' },
                6: { bg: '#db2777', text: '#fff' },
                7: { bg: '#111827', text: '#fff' },
                8: { bg: '#4b5563', text: '#fff' },
                9: { bg: '#ea580c', text: '#fff' },
                0: { bg: '#f8fafc', text: '#000' }
            };
            return config[lastDigit];
        };

        const FREQUENCY_LEVELS = [
            { id: 0, val: 100, label: "Nível 1", sub: "100+ Sorteios" },
            { id: 1, val: 150, label: "Nível 2", sub: "150+ Sorteios" },
            { id: 2, val: 200, label: "Nível 3", sub: "200+ Sorteios" },
            { id: 3, val: 250, label: "Elite", sub: "Acima de 200" }
        ];

        const App = () => {
            const [results, setResults] = useState([]);
            const [loading, setLoading] = useState(true);
            const [levelIndex, setLevelIndex] = useState(1);

            useEffect(() => {
                fetch('https://loteriascaixa-api.herokuapp.com/api/lotofacil')
                    .then(res => res.json())
                    .then(data => {
                        setResults(Array.isArray(data) ? data : [data]);
                        setLoading(false);
                    })
                    .catch(() => setLoading(false));
            }, []);

            const currentMinFreq = FREQUENCY_LEVELS[levelIndex].val;

            const analysis = useMemo(() => {
                if (results.length === 0) return null;
                const timeline = [...results].sort((a, b) => parseInt(a.concurso) - parseInt(b.concurso));
                
                return Array.from({ length: 15 }).map((_, colIdx) => {
                    const freqMap = {};
                    timeline.forEach(draw => {
                        const num = Number(draw.dezenas.sort((a,b) => a-b)[colIdx]);
                        freqMap[num] = (freqMap[num] || 0) + 1;
                    });

                    const pool = Object.keys(freqMap).map(Number).filter(n => freqMap[n] >= currentMinFreq);
                    let currentSet = new Set();
                    let cycleCount = 0;

                    timeline.forEach(draw => {
                        const num = Number(draw.dezenas.sort((a,b) => a-b)[colIdx]);
                        if (pool.includes(num)) {
                            currentSet.add(num);
                            if (currentSet.size === pool.length) {
                                cycleCount++;
                                currentSet = new Set();
                            }
                        }
                    });

                    const missing = pool.filter(n => !currentSet.has(n));
                    const present = Array.from(currentSet);
                    
                    return {
                        col: colIdx + 1,
                        missing: missing.sort((a,b) => a - b),
                        present: present.sort((a,b) => a - b),
                        cycleCount,
                        progress: pool.length > 0 ? (((pool.length - missing.length) / pool.length) * 100).toFixed(0) : 0,
                        freqMap
                    };
                });
            }, [results, currentMinFreq]);

            if (loading) return (
                <div className="h-screen flex flex-col items-center justify-center bg-[#020617]">
                    <div className="w-12 h-12 border-4 border-indigo-500/20 border-t-indigo-500 rounded-full animate-spin mb-4"></div>
                    <span className="text-[10px] font-black uppercase tracking-[0.3em] text-slate-500 text-center">Sincronizando Globos...</span>
                </div>
            );

            return (
                <div className="max-w-md mx-auto pb-12">
                    <header className="p-6 pb-2">
                        <div className="flex items-center gap-3">
                            <div className="text-indigo-500"><Icons.Target /></div>
                            <h1 className="text-xl font-black tracking-tighter italic uppercase text-white">CICLOS POR <span className="text-indigo-400">COLUNA</span></h1>
                        </div>
                    </header>

                    {/* Filtro por Níveis */}
                    <div className="mx-4 mb-4 p-5 bg-slate-900/50 border border-white/10 rounded-[2rem] shadow-lg">
                        <label className="text-[11px] font-black text-indigo-400 uppercase tracking-widest block mb-4 italic">Filtro de Frequência Histórica</label>
                        
                        <div className="grid grid-cols-2 gap-3">
                            {FREQUENCY_LEVELS.map((level) => (
                                <button
                                    key={level.id}
                                    onClick={() => setLevelIndex(level.id)}
                                    className={`btn-select text-left p-3 rounded-2xl border transition-all ${
                                        levelIndex === level.id 
                                        ? 'bg-indigo-600 border-indigo-400 shadow-lg shadow-indigo-600/20' 
                                        : 'bg-white/5 border-white/5 opacity-60'
                                    }`}
                                >
                                    <p className={`text-[10px] font-black uppercase tracking-tighter ${levelIndex === level.id ? 'text-indigo-100' : 'text-slate-400'}`}>
                                        {level.label}
                                    </p>
                                    <p className={`text-xs font-bold ${levelIndex === level.id ? 'text-white' : 'text-slate-300'}`}>
                                        {level.sub}
                                    </p>
                                </button>
                            ))}
                        </div>
                    </div>

                    <div className="px-4 mb-6">
                        <div className="bg-slate-900/50 border border-white/10 p-4 rounded-3xl flex justify-between items-center shadow-inner">
                            <div>
                                <p className="text-[9px] font-black text-slate-500 uppercase tracking-tighter">Último Concurso</p>
                                <p className="text-lg font-num font-black text-white leading-tight">#{results[0]?.concurso}</p>
                            </div>
                            <div className="text-right">
                                <p className="text-[9px] font-black text-slate-500 uppercase tracking-tighter">Total de Jogos</p>
                                <p className="text-sm font-num font-bold text-slate-300 leading-tight">{results.length}</p>
                            </div>
                        </div>
                    </div>

                    <div className="px-4 space-y-8">
                        {analysis?.map((item) => (
                            <div key={item.col} className="card-relief border border-white/20 rounded-[2.5rem] p-6 relative overflow-hidden">
                                <div className="flex justify-between items-start mb-6">
                                    <div className="space-y-1">
                                        <div className="flex items-center gap-2 mb-1">
                                            <span className="px-3 py-1 bg-indigo-500 text-white text-[11px] font-black rounded-lg uppercase shadow-md shadow-indigo-500/20 tracking-tight border border-white/10">COLUNA {item.col}</span>
                                            <span className="text-[13px] font-black text-white uppercase tracking-widest">Ciclo {item.cycleCount}</span>
                                        </div>
                                        <h3 className="text-xl font-black text-white tracking-tight leading-tight">
                                            {item.missing.length > 0 ? `Faltam ${item.missing.length} dezenas` : "Ciclo Completo"}
                                        </h3>
                                    </div>
                                    <div className="text-right">
                                        <span className={`text-2xl font-black drop-shadow-md ${parseInt(item.progress) > 80 ? 'text-emerald-400' : 'text-slate-300'}`}>
                                            {item.progress}%
                                        </span>
                                    </div>
                                </div>

                                <div className="w-full bg-black/40 h-2.5 rounded-full mb-8 overflow-hidden border border-white/5 shadow-inner">
                                    <div 
                                        className="h-full bg-indigo-500 transition-all duration-700 ease-out shadow-[0_0_10px_rgba(99,102,241,0.5)]"
                                        style={{ width: `${item.progress}%` }}
                                    ></div>
                                </div>

                                {/* SEÇÃO: AINDA NÃO VIERAM */}
                                <div className="mb-6">
                                    <div className="flex items-center gap-2 mb-4">
                                        <div className="w-2 h-2 rounded-full bg-indigo-500 shadow-[0_0_8px_rgba(99,102,241,1)]"></div>
                                        <span className="text-[10px] font-black text-indigo-400 uppercase tracking-widest italic">Ainda não vieram</span>
                                    </div>
                                    <div className="flex flex-wrap gap-4">
                                        {item.missing.map(num => {
                                            const ballStyle = getBallStyle(num);
                                            return (
                                                <div key={num} className="flex flex-col items-center">
                                                    <div 
                                                        className="lotto-ball w-12 border border-white/10" 
                                                        style={{ backgroundColor: ballStyle.bg }}
                                                    >
                                                        <span 
                                                            className="text-xl font-num font-black leading-none"
                                                            style={{ color: ballStyle.text }}
                                                        >
                                                            {String(num).padStart(2, '0')}
                                                        </span>
                                                    </div>
                                                    <span className="text-[9px] font-bold text-slate-400 mt-2 font-num uppercase tracking-tighter">{item.freqMap[num]}x</span>
                                                </div>
                                            );
                                        })}
                                        {item.missing.length === 0 && (
                                            <div className="w-full py-6 text-center border-2 border-dashed border-emerald-500/20 rounded-3xl bg-emerald-500/5 shadow-inner">
                                                <span className="text-xs font-black text-emerald-500 uppercase tracking-[0.2em]">Ciclo Fechado!</span>
                                            </div>
                                        )}
                                    </div>
                                </div>

                                {/* SEÇÃO: JÁ CONFIRMADOS NO CICLO */}
                                {item.present.length > 0 && (
                                    <div className="pt-5 border-t border-white/10">
                                        <span className="text-[9px] font-black text-slate-600 uppercase tracking-widest block mb-4 italic">Já vieram no ciclo</span>
                                        <div className="flex flex-wrap gap-3 opacity-30 grayscale-[0.5]">
                                            {item.present.map(num => {
                                                const ballStyle = getBallStyle(num);
                                                return (
                                                    <div key={num} className="relative lotto-ball w-9 border border-white/5" style={{ backgroundColor: ballStyle.bg }}>
                                                        <span className="text-xs font-num font-bold" style={{ color: ballStyle.text }}>
                                                            {String(num).padStart(2, '0')}
                                                        </span>
                                                        <div className="absolute -top-1 -right-1 bg-emerald-500 rounded-full p-0.5 shadow-sm border border-[#020617]">
                                                            <Icons.Check />
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                )}
                            </div>
                        ))}
                    </div>

                    <footer className="mt-12 mb-12 px-8 text-center opacity-60">
                        <p className="text-[9px] font-bold text-slate-700 uppercase tracking-[0.4em]">Análise de Probabilidade Posicional</p>
                        <p className="text-[8px] text-slate-800 mt-3 italic leading-relaxed">
                            Bolas coloridas seguem o padrão oficial CAIXA. 
                            Foque nos números vibrantes para identificar o fechamento dos ciclos por coluna.
                        </p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
